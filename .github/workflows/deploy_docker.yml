name: 🐳 Build and Push Docker Image

on:
  push:
    branches:
      - master
  workflow_dispatch:

env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/jkt48showroom
  IMAGE_TAG: latest

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 🧰 Checkout
        uses: actions/checkout@v4

      - name: 🔧 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3.11.1

      - name: 🔑 Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: 🏗️ Build and push image
        uses: docker/build-push-action@v6.17.0
        with:
          push: true
          tags: ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}

  deploy:
    runs-on: ubuntu-latest
    needs: build
    env:
      SSH_PRIVATE_KEY: ${{ secrets.CI_PRIVATE_KEY }}
    steps:
      - name: Setup SSH Key
        run: echo "$SSH_PRIVATE_KEY" > private_key && chmod 600 private_key

      - name: 🔁 Re-pull & restart Docker
        run: |
          ssh -o StrictHostKeyChecking=no -i private_key \
            ${{ secrets.CI_USER }}@${{ secrets.CI_HOST }} \
            "cd ${{ vars.DEPLOY_APP_DIR }} && \
            echo '🔄 Pulling latest Docker image...' && \
            docker compose pull api && \
            echo '♻️ Restarting containers...' && \
            docker compose up -d --no-deps --force-recreate api && \
            echo '✅ Deployment complete!'"
